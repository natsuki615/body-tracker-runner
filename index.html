<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; padding: 1rem; background: #fff; color: #111; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.title { font-size: 15px; font-weight: 500; }
.badge { font-size: 12px; padding: 3px 10px; border-radius: 999px; background: #f1f1f1; border: 0.5px solid #ddd; color: #555; }
.controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }
button { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; cursor: pointer; }
button:hover { background: #f5f5f5; }
.stage { width: 100%; border-radius: 12px; border: 0.5px solid #ddd; overflow: hidden; background: #000; }
.stage iframe { width: 100%; height: 100vh; border: none; display: block; }
.overlay-bar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #fff; border-top: 0.5px solid #ddd; }
.sketch-name { font-size: 13px; font-weight: 500; flex: 1; }
.sketch-link { font-size: 12px; color: #888; text-decoration: none; }
.sketch-link:hover { color: #111; }
.progress-bar { width: 100%; height: 3px; background: #e0e0e0; border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
.progress-fill { height: 100%; background: #555; border-radius: 2px; transition: width 0.5s linear; }
.dots { display: flex; gap: 6px; margin-top: 12px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; cursor: pointer; transition: background 0.2s; }
.dot.on { background: #111; }
.edit-section { margin-top: 16px; border: 0.5px solid #ddd; border-radius: 12px; overflow: hidden; }
.edit-header { padding: 10px 14px; font-size: 13px; font-weight: 500; color: #555; background: #f9f9f9; border-bottom: 0.5px solid #ddd; cursor: pointer; display: flex; justify-content: space-between; }
.edit-body { padding: 14px; display: none; }
.edit-body.open { display: block; }
.row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.row input { flex: 1; font-size: 13px; padding: 6px 10px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #111; }
.row .lbl { font-size: 12px; color: #888; width: 60px; flex-shrink: 0; }
.row button.del { padding: 5px 10px; color: #888; }
.dur-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.dur-row label { font-size: 13px; color: #555; }
.dur-row input[type=range] { flex: 1; }
.dur-val { font-size: 13px; font-weight: 500; min-width: 36px; }
</style>
</head>
<body>

<div class="header">
  <span class="title">Sketch runner</span>
  <span class="badge" id="counter">1 / 3</span>
  <div class="controls">
    <button id="prevBtn">&#8592;</button>
    <button id="playBtn">Pause</button>
    <button id="nextBtn">&#8594;</button>
    <button id="fsBtn">⛶ Fullscreen</button> 
  </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>

<div class="stage">
  <iframe id="frame" allowfullscreen allow="camera; microphone; fullscreen"></iframe>
  <div class="overlay-bar">
    <span class="sketch-name" id="sName">—</span>
    <a class="sketch-link" id="sLink" href="#" target="_blank">open in openprocessing ↗</a>
  </div>
</div>

<div class="dots" id="dots"></div>

<div class="edit-section">
  <div class="edit-header" id="editToggle">Configure sketches &amp; timing <span id="editArrow">▸</span></div>
  <div class="edit-body" id="editBody">
    <div class="dur-row">
      <label>Seconds per sketch</label>
      <input type="range" id="durSlider" min="5" max="120" step="5" value="30">
      <span class="dur-val" id="durVal">30s</span>
    </div>
    <div id="sketchList"></div>
    <button id="addBtn" style="margin-top:4px;font-size:13px;">+ add sketch</button>
    <div style="margin-top:12px;">
      <button id="applyBtn">Apply changes</button>
    </div>
  </div>
</div>

<script>
let sketches = [
  { name: "Sonya Hamid - Flowers", url: "https://openprocessing.org/sketch/2777845" }, 
  { name: "Carina Zheng - Bubbly", url: "https://natsuki615.github.io/bubbly/" }, 
  { name: "Mano Rajesh - Cells", url: "https://openprocessing.org/sketch/2777915" }, 
  { name: "Joana Liu - Sysiphus", url: "https://openprocessing.org/sketch/2787464" }, 
  { name: "Sonya Hamid - Sparks", url: "https://openprocessing.org/sketch/2556712" }, 
];
let duration = 30;
let current = 0;
let playing = true;
let elapsed = 0;
let ticker = null;

function sketchURL(url) {
  return url.includes("openprocessing.org") ? url + "/embed/" : url;
}

function buildDots() {
  const c = document.getElementById("dots");
  c.innerHTML = "";
  sketches.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === current ? " on" : "");
    d.onclick = () => goTo(i);
    c.appendChild(d);
  });
}

function render() {
  const s = sketches[current];
  document.getElementById("frame").src = sketchURL(s.url);
  document.getElementById("sName").textContent = s.name;
  document.getElementById("sLink").href = s.url;
  document.getElementById("counter").textContent = `${current + 1} / ${sketches.length}`;
  buildDots();
  elapsed = 0;
  updateBar();
}

function updateBar() {
  const pct = Math.min((elapsed / duration) * 100, 100);
  document.getElementById("pFill").style.width = pct + "%";
}

function goTo(i) {
  current = ((i % sketches.length) + sketches.length) % sketches.length;
  render();
}

function startTicker() {
  clearInterval(ticker);
  ticker = setInterval(() => {
    if (!playing) return;
    elapsed += 0.5;
    updateBar();
    if (elapsed >= duration) goTo(current + 1);
  }, 500);
}

document.getElementById("playBtn").onclick = () => {
  playing = !playing;
  document.getElementById("playBtn").textContent = playing ? "Pause" : "Play";
};
document.getElementById("prevBtn").onclick = () => goTo(current - 1);
document.getElementById("nextBtn").onclick = () => goTo(current + 1);
document.getElementById("fsBtn").onclick = () => {
  document.getElementById("frame").requestFullscreen();
};

document.getElementById("editToggle").onclick = () => {
  const b = document.getElementById("editBody");
  const a = document.getElementById("editArrow");
  const open = b.classList.toggle("open");
  a.textContent = open ? "▾" : "▸";
  if (open) buildEditor();
};

document.getElementById("durSlider").oninput = function() {
  document.getElementById("durVal").textContent = this.value + "s";
};

function buildEditor() {
  const list = document.getElementById("sketchList");
  list.innerHTML = "";
  sketches.forEach((s, i) => {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <span class="lbl">Name</span>
      <input type="text" value="${s.name}" data-i="${i}" data-f="name" />
      <span class="lbl" style="width:30px">URL</span>
      <input type="text" value="${s.url}" data-i="${i}" data-f="url" style="font-family:monospace;font-size:12px;" placeholder="sketch URL" />
      <button class="del" data-i="${i}">✕</button>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll("input").forEach(inp => {
    inp.oninput = () => { sketches[inp.dataset.i][inp.dataset.f] = inp.value; };
  });
  list.querySelectorAll(".del").forEach(btn => {
    btn.onclick = () => { sketches.splice(parseInt(btn.dataset.i), 1); buildEditor(); };
  });
}

document.getElementById("addBtn").onclick = () => {
  sketches.push({ name: "New sketch", url: "" });
  buildEditor();
};

document.getElementById("applyBtn").onclick = () => {
  duration = parseInt(document.getElementById("durSlider").value);
  current = 0;
  render();
  document.getElementById("editBody").classList.remove("open");
  document.getElementById("editArrow").textContent = "▸";
};

render();
startTicker();
</script>
</body>
</html>
